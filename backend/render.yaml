services:
  - type: web
    name: ai-database-copilot-backend
    env: python
    buildCommand: pip install -r requirements.txt && python seed_demo_dbs.py
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./ai_copilot.db
      - key: ALLOWED_ORIGINS
        value: '["https://your-app.vercel.app"]'